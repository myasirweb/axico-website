<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060f1e"/>
      <stop offset="45%" style="stop-color:#0d3b6a"/>
      <stop offset="100%" style="stop-color:#1C6FC4"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F8CF01"/>
      <stop offset="100%" style="stop-color:#f5a800"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1C6FC4;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1C6FC4;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="1200" height="320" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)" rx="16"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
  </g>

  <!-- Big decorative circle top-right -->
  <circle cx="1100" cy="-60" r="260" fill="none" stroke="#1C6FC4" stroke-width="1" opacity="0.2"/>
  <circle cx="1100" cy="-60" r="200" fill="none" stroke="#1C6FC4" stroke-width="0.5" opacity="0.15"/>
  <circle cx="1100" cy="-60" r="140" fill="url(#glowGrad)" opacity="0.3"/>

  <!-- Decorative circle bottom-left -->
  <circle cx="60" cy="380" r="200" fill="none" stroke="#F8CF01" stroke-width="0.8" opacity="0.1"/>
  <circle cx="60" cy="380" r="140" fill="none" stroke="#F8CF01" stroke-width="0.5" opacity="0.08"/>

  <!-- Diagonal accent shape -->
  <polygon points="800,0 1200,0 1200,320 900,320" fill="#1C6FC4" fill-opacity="0.08"/>

  <!-- Left yellow accent bar -->
  <rect x="0" y="0" width="6" height="320" fill="url(#yellowGrad)" rx="3"/>

  <!-- Floating dots (decorative) -->
  <circle cx="750" cy="50" r="3" fill="#F8CF01" opacity="0.5"/>
  <circle cx="780" cy="80" r="2" fill="#F8CF01" opacity="0.35"/>
  <circle cx="720" cy="90" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="850" cy="40" r="2" fill="#ffffff" opacity="0.25"/>
  <circle cx="700" cy="260" r="2.5" fill="#F8CF01" opacity="0.3"/>
  <circle cx="730" cy="285" r="1.5" fill="#ffffff" opacity="0.2"/>

  <!-- ===== LEFT CONTENT ===== -->

  <!-- AIXCO Logo text / brand -->
  <text x="55" y="115" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="4" filter="url(#glow)">AIXCO</text>

  <!-- Underline accent -->
  <rect x="55" y="125" width="320" height="4" fill="url(#yellowGrad)" rx="2"/>

  <!-- Tagline -->
  <text x="57" y="165" font-family="Arial, sans-serif" font-size="15" font-weight="400" fill="#a8c8f0" letter-spacing="3">IMMOBILIENGESICHERTE  FESTZINSANLAGE</text>

  <!-- Description -->
  <text x="57" y="205" font-family="Arial, sans-serif" font-size="13" fill="#7aabda" opacity="0.9">Real estate-secured fixed-rate investment · Listed on Wiener Börse</text>

  <!-- Tech badges -->
  <rect x="57" y="228" width="72" height="24" rx="12" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="93" y="244" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">HTML5</text>

  <rect x="138" y="228" width="95" height="24" rx="12" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="185" y="244" font-family="Arial, sans-serif" font-size="10" fill="#38bdf8" text-anchor="middle">Tailwind CSS</text>

  <rect x="242" y="228" width="60" height="24" rx="12" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="272" y="244" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">PHP</text>

  <rect x="311" y="228" width="95" height="24" rx="12" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="358" y="244" font-family="Arial, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">Responsive</text>

  <!-- ===== RIGHT CARDS ===== -->

  <!-- Card 1: Return Rate -->
  <rect x="740" y="50" width="170" height="140" rx="14" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="825" y="88" font-family="Arial, sans-serif" font-size="11" fill="#a8c8f0" text-anchor="middle" letter-spacing="1">FIXED RETURN</text>
  <text x="825" y="138" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#F8CF01" text-anchor="middle" filter="url(#softglow)">6%</text>
  <text x="825" y="162" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" opacity="0.7">per annum</text>

  <!-- Card 2: Exchange -->
  <rect x="930" y="50" width="170" height="140" rx="14" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Building icon (simple) -->
  <rect x="990" y="88" width="80" height="5" rx="2" fill="#F8CF01" opacity="0.8"/>
  <rect x="997" y="78" width="10" height="15" rx="1" fill="#ffffff" opacity="0.6"/>
  <rect x="1013" y="72" width="10" height="21" rx="1" fill="#ffffff" opacity="0.8"/>
  <rect x="1029" y="76" width="10" height="17" rx="1" fill="#ffffff" opacity="0.6"/>
  <rect x="1045" y="81" width="10" height="12" rx="1" fill="#ffffff" opacity="0.5"/>
  <text x="1015" y="115" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">WIENER BÖRSE</text>
  <text x="1015" y="131" font-family="Arial, sans-serif" font-size="10" fill="#a8c8f0" text-anchor="middle">Vienna MTF</text>
  <text x="1015" y="148" font-family="Arial, sans-serif" font-size="9" fill="#F8CF01" text-anchor="middle" opacity="0.8">● Listed</text>
  <text x="1015" y="164" font-family="Arial, sans-serif" font-size="8" fill="#7aabda" text-anchor="middle">Worldwide Accessible</text>

  <!-- Card 3 & 4 bottom row -->
  <rect x="740" y="210" width="170" height="80" rx="14" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="825" y="245" font-family="Arial, sans-serif" font-size="10" fill="#a8c8f0" text-anchor="middle" letter-spacing="1">MIN. INVESTMENT</text>
  <text x="825" y="270" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle">€ 1.000</text>

  <rect x="930" y="210" width="170" height="80" rx="14" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="1015" y="245" font-family="Arial, sans-serif" font-size="10" fill="#a8c8f0" text-anchor="middle" letter-spacing="1">SECURITY</text>
  <text x="1015" y="268" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#34d399" text-anchor="middle">Real Estate</text>
  <text x="1015" y="282" font-family="Arial, sans-serif" font-size="9" fill="#7aabda" text-anchor="middle">Immobilien Secured</text>

  <!-- Bottom strip -->
  <rect x="0" y="298" width="1200" height="22" fill="#000000" fill-opacity="0.25" rx="0"/>
  <text x="600" y="313" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" letter-spacing="2">AIXCO-ANLEIHE.DE  ·  CUSTOM WEBSITE PROJECT  ·  © 2024 AIXCO</text>
</svg>
