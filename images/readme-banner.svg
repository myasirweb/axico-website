<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3b6a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1C6FC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5fa8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F8CF01;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b800;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="10"/>

  <!-- Decorative circles -->
  <circle cx="820" cy="-20" r="120" fill="#ffffff" fill-opacity="0.04"/>
  <circle cx="780" cy="200" r="90" fill="#ffffff" fill-opacity="0.04"/>
  <circle cx="80" cy="220" r="100" fill="#F8CF01" fill-opacity="0.05"/>

  <!-- Yellow accent bar on left -->
  <rect x="0" y="0" width="8" height="200" fill="url(#accentGrad)" rx="10"/>

  <!-- Yellow badge -->
  <rect x="38" y="60" width="130" height="44" fill="#F8CF01" rx="6"/>
  <text x="103" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#0d3b6a" text-anchor="middle">FESTZINSANLAGE</text>
  <text x="103" y="96" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="#0d3b6a" text-anchor="middle">6% p.a.</text>

  <!-- Main Title -->
  <text x="192" y="90" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#ffffff" letter-spacing="1">AIXCO</text>
  <text x="192" y="118" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#a8c8f0" letter-spacing="2">IMMOBILIENGESICHERTE INVESTITION</text>

  <!-- Divider line -->
  <rect x="192" y="130" width="280" height="2" fill="#F8CF01" rx="1"/>

  <!-- Sub text -->
  <text x="192" y="154" font-family="Arial, sans-serif" font-size="12" fill="#c8dff5">Attraktive Renditen | Wiener Börse | Planbare Rückzahlung</text>

  <!-- Right side stats -->
  <rect x="620" y="40" width="140" height="60" fill="#ffffff" fill-opacity="0.08" rx="8"/>
  <text x="690" y="68" font-family="Arial, sans-serif" font-size="11" fill="#a8c8f0" text-anchor="middle">FIXED INTEREST RATE</text>
  <text x="690" y="90" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#F8CF01" text-anchor="middle">6% p.a.</text>

  <rect x="775" y="40" width="100" height="60" fill="#ffffff" fill-opacity="0.08" rx="8"/>
  <text x="825" y="68" font-family="Arial, sans-serif" font-size="10" fill="#a8c8f0" text-anchor="middle">LISTED ON</text>
  <text x="825" y="84" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">WIENER BÖRSE</text>
  <text x="825" y="98" font-family="Arial, sans-serif" font-size="9" fill="#a8c8f0" text-anchor="middle">Vienna MTF</text>

  <!-- Bottom tagline -->
  <text x="450" y="180" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.4" text-anchor="middle">Built with HTML · Tailwind CSS · PHP</text>
</svg>
